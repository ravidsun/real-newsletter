name: Deploy to Hostinger (Prod)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Deploy to Hostinger Prod VPS via official action ───────────────
      - name: Deploy to Hostinger (Prod)
        uses: hostinger/deploy-action@v1
        with:
          api-key: ${{ secrets.HOSTINGER_API_KEY }}
          virtual-machine: ${{ vars.HOSTINGER_VM_ID }}
          docker-compose-path: docker-compose.prod.yml
          # For private repos, uncomment:
          # personal-token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          environment-variables: |
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            SPRING_PROFILES_ACTIVE=prd

