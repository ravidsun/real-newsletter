name: Deploy to Prod VPS

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # ── 0. Validate required secrets are present ──────────────────────────
      - name: Validate secrets
        run: |
          missing=()
          [[ -z "${{ secrets.PROD_VPS_HOST }}"    ]] && missing+=("PROD_VPS_HOST")
          [[ -z "${{ secrets.PROD_VPS_USER }}"    ]] && missing+=("PROD_VPS_USER")
          [[ -z "${{ secrets.PROD_VPS_SSH_KEY }}" ]] && missing+=("PROD_VPS_SSH_KEY")
          [[ -z "${{ secrets.DB_PASSWORD }}"      ]] && missing+=("DB_PASSWORD")
          [[ -z "${{ secrets.GHCR_TOKEN }}"       ]] && missing+=("GHCR_TOKEN")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "❌ Missing GitHub secrets: ${missing[*]}"
            echo "   Go to: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "✅ All required secrets are present."

      # ── 1. Checkout source ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Log in to GitHub Container Registry ────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      # ── 3. Extract Docker metadata (tags, labels) ─────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=prod-
            latest

      # ── 4. Build and push Docker image ────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # ── 5. Pre-flight: test TCP connectivity to the VPS ──────────────────────
      - name: Test SSH port reachability
        continue-on-error: true
        run: |
          PORT=${{ vars.PROD_VPS_SSH_PORT || '22' }}
          echo "Testing TCP connectivity to ${{ secrets.PROD_VPS_HOST }}:$PORT ..."
          timeout 10 bash -c "cat < /dev/null > /dev/tcp/${{ secrets.PROD_VPS_HOST }}/$PORT" \
            && echo "✅ Port $PORT is reachable." \
            || echo "⚠️  Cannot reach port $PORT — ensure Hostinger panel firewall allows TCP:$PORT from 0.0.0.0/0"

      # ── 6. SSH into Prod VPS and redeploy ─────────────────────────────────
      - name: Deploy to Prod VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_VPS_HOST }}
          username: ${{ secrets.PROD_VPS_USER }}
          key: ${{ secrets.PROD_VPS_SSH_KEY }}
          port: ${{ vars.PROD_VPS_SSH_PORT || 22 }}
          timeout: 30s
          command_timeout: 10m
          script: |
            set -e
            mkdir -p /opt/real-newsletter
            cd /opt/real-newsletter
            # Fetch latest compose file with auth (works for private repos)
            curl -fsSL \
              -H "Authorization: Bearer ${{ secrets.GHCR_TOKEN }}" \
              -H "Accept: application/vnd.github.raw+json" \
              "https://api.github.com/repos/${{ github.repository }}/contents/docker-compose.prod.yml?ref=main" \
              -o docker-compose.prod.yml
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export APP_IMAGE=ghcr.io/${{ github.repository }}:latest
            export DB_URL=${{ vars.PROD_DB_URL }}
            export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            # Tear down existing containers to release port bindings
            docker compose -f docker-compose.prod.yml down --remove-orphans || true
            # Kill any non-compose process still holding port 8080
            docker ps --filter publish=8080 -q | xargs -r docker stop || true
            fuser -k 8080/tcp 2>/dev/null || true
            # Pull latest image and start
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d || {
              echo "=== docker compose up failed — app container logs ==="
              docker logs real-newsletter-app-1 2>&1 || true
              exit 1
            }
            docker image prune -f
