name: Deploy to Dev VPS

on:
  push:
    branches: [ develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # ── 0. Validate required secrets are present ──────────────────────────
      - name: Validate secrets
        run: |
          missing=()
          [[ -z "${{ secrets.DEV_VPS_HOST }}"    ]] && missing+=("DEV_VPS_HOST")
          [[ -z "${{ secrets.DEV_VPS_USER }}"    ]] && missing+=("DEV_VPS_USER")
          [[ -z "${{ secrets.DEV_VPS_SSH_KEY }}" ]] && missing+=("DEV_VPS_SSH_KEY")
          [[ -z "${{ secrets.DB_PASSWORD_DEV }}" ]] && missing+=("DB_PASSWORD_DEV")
          [[ -z "${{ secrets.GHCR_TOKEN }}"      ]] && missing+=("GHCR_TOKEN")
          [[ -z "${{ vars.DEV_DB_URL }}"         ]] && missing+=("DEV_DB_URL (variable)")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "❌ Missing GitHub secrets/variables: ${missing[*]}"
            echo "   Go to: Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "✅ All required secrets are present."

      # ── 1. Checkout source ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Log in to GitHub Container Registry ────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      # ── 3. Extract Docker metadata (tags, labels) ─────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=dev-

      # ── 4. Build and push Docker image ────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # ── 5. Pre-flight: test TCP connectivity to the VPS ──────────────────────
      - name: Test SSH port reachability
        continue-on-error: true
        run: |
          PORT=${{ vars.DEV_VPS_SSH_PORT || '22' }}
          echo "Testing TCP connectivity to ${{ secrets.DEV_VPS_HOST }}:$PORT ..."
          timeout 10 bash -c "cat < /dev/null > /dev/tcp/${{ secrets.DEV_VPS_HOST }}/$PORT" \
            && echo "✅ Port $PORT is reachable." \
            || echo "⚠️  Cannot reach port $PORT — ensure Hostinger panel firewall allows TCP:$PORT from 0.0.0.0/0"

      # ── 6. SSH into Dev VPS and redeploy ──────────────────────────────────
      - name: Deploy to Dev VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_VPS_HOST }}
          username: ${{ secrets.DEV_VPS_USER }}
          key: ${{ secrets.DEV_VPS_SSH_KEY }}
          port: ${{ vars.DEV_VPS_SSH_PORT || 22 }}
          timeout: 30s
          command_timeout: 10m
          script: |
            set -e
            mkdir -p /opt/real-newsletter
            cd /opt/real-newsletter
            # Copy compose file if not present
            [ -f docker-compose.yml ] || curl -fsSL \
              https://raw.githubusercontent.com/${{ github.repository }}/develop/docker-compose.yml \
              -o docker-compose.yml
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export APP_IMAGE=ghcr.io/${{ github.repository }}:develop
            export DB_URL=${{ vars.DEV_DB_URL }}
            export DB_PASSWORD=${{ secrets.DB_PASSWORD_DEV }}
            docker compose -f docker-compose.yml pull
            docker compose -f docker-compose.yml up -d --remove-orphans || {
              echo "=== docker compose up failed — app container logs ==="
              docker logs real-newsletter-app-1 2>&1 || true
              exit 1
            }
            docker image prune -f
