
# ---------------------------------------------------------------------------
# docker-compose.prod.yml – Real Newsletter production stack
#
# The app image is built by GitHub Actions and pushed to GHCR.
# The VPS pulls the pre-built image – no source code needed on the server.
#
# Required environment variables (injected by GitHub Actions or a .env file):
#   APP_IMAGE      – Full GHCR image reference, e.g. ghcr.io/org/repo:latest
#   DB_PASSWORD    – PostgreSQL password
# ---------------------------------------------------------------------------

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: realnews
    # Port 5432 is intentionally NOT exposed to the host.
    # The app container reaches db via Docker's internal network.
    # Expose only if you need direct access from the host for debugging:
    # ports:
    #   - "5433:5432"   # use 5433 to avoid conflicts with a host-level postgres
    volumes:
      - pgdata-prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d realnews"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Spring Boot application ────────────────────────────────────────────────
  app:
    image: ${APP_IMAGE}
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/realnews?sslmode=disable
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_PROFILES_ACTIVE: prd
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata-prod:

