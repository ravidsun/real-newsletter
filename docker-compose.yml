# ---------------------------------------------------------------------------
# docker-compose.yml – Real Newsletter dev stack
#
# Uses an external PostgreSQL instance already running on the VPS.
# No db container needed.
#
# Required environment variables:
#   APP_IMAGE    – Full GHCR image reference, e.g. ghcr.io/org/repo:develop
#   DB_URL       – JDBC connection string, e.g. jdbc:postgresql://host:5432/db
#   DB_PASSWORD_DEV  – PostgreSQL password
# ---------------------------------------------------------------------------

services:

  # ── Spring Boot application ───────────────────────────────────────────────
  app:
    image: ${APP_IMAGE}
    ports:
      - "8080:8080"
    environment:
      DB_URL: ${DB_URL}
      DB_PASSWORD: ${DB_PASSWORD_DEV}
      SPRING_PROFILES_ACTIVE: dev
    restart: unless-stopped
