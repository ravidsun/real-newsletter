
# ---------------------------------------------------------------------------
# docker-compose.yml – Real Newsletter local development stack
#
# Prerequisites:
#   1. Copy .env.example → .env and fill in your Supabase credentials.
#   2. Run: docker compose up --build
# ---------------------------------------------------------------------------

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    pull_policy: build
    restart: unless-stopped

