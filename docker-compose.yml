# ---------------------------------------------------------------------------
# docker-compose.yml – Real Newsletter dev stack
#
# Runs alongside Coolify/Traefik on the VPS.
# Traefik handles routing — no direct port exposure needed.
#
# Required environment variables:
#   APP_IMAGE    – Full GHCR image reference
#   DB_URL       – JDBC connection string
#   DB_PASSWORD  – PostgreSQL password
#   APP_HOST     – Hostname Traefik should route to this app (e.g. dev-api.yourdomain.com)
# ---------------------------------------------------------------------------

services:
  app:
    image: ${APP_IMAGE}
    pull_policy: always
    container_name: real-newsletter-dev
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      DB_URL: ${DB_URL}
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_PROFILES_ACTIVE: dev
    restart: unless-stopped
    networks:
      - default
      # ── Optional: Uncomment below if you have Coolify/Traefik installed ──
      # - coolify
    labels:
      # ── Optional: Uncomment below if you have Traefik installed ──
      # - "traefik.enable=${TRAEFIK_ENABLED:-false}"
      # - "traefik.http.routers.real-newsletter-dev.rule=Host(`${APP_HOST:-localhost}`)"
      # - "traefik.http.routers.real-newsletter-dev.entrypoints=http"
      # - "traefik.http.services.real-newsletter-dev.loadbalancer.server.port=8081"
      - "description=Real Newsletter Dev"

networks:
  default:
    driver: bridge
  # ── Optional: Uncomment below if you have Coolify/Traefik installed ──
  # coolify:
  #   external: true
