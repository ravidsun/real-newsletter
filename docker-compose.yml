
# ---------------------------------------------------------------------------
# docker-compose.yml – Real Newsletter dev stack
#
# Used by the develop-branch CI workflow to deploy to the dev VPS.
# The app image is built by GitHub Actions (GHCR) and pulled here.
#
# For purely local development you can override the app service with
# `build: { context: . }` or run: docker compose up --build
#
# Required environment variables:
#   APP_IMAGE    – Full GHCR image reference, e.g. ghcr.io/org/repo:develop
#   DB_PASSWORD  – PostgreSQL password
# ---------------------------------------------------------------------------

services:

  # ── Local PostgreSQL (creates realnews-dev database automatically) ────────
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: realnews-dev      # auto-created on first boot
    ports:
      - "5432:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d realnews-dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Spring Boot application ───────────────────────────────────────────────
  app:
    # On the dev VPS: pull the GHCR image built by the develop branch CI run.
    # For local development you can override this with `build: { context: . }`
    # or run: docker compose up --build
    image: ${APP_IMAGE}
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/realnews-dev?sslmode=disable
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata-dev:

