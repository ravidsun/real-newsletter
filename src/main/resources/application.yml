spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    # Supabase Transaction Pooler JDBC URL (port 6543).
    # Loaded from DB_URL environment variable (via .env file).
    # Falls back to local PostgreSQL if environment variables are not set.
    url: ${DB_URL:}
    username: ${DB_USER:realnewsuser}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 5               # Keep all connections warm (fixed pool, no cold-start penalty)
      connection-timeout: 10000     # Fail fast after 10s
      idle-timeout: 300000          # Release idle connections after 5 min
      max-lifetime: 600000          # Recycle connections every 10 min
      keepalive-time: 60000         # Send keepalive every 60s to prevent stale connections
      # DO NOT set connection-test-query — PostgreSQL JDBC4 uses native isValid() which is faster
      # Workaround for "prepared statement does not exist" errors with pgBouncer.
      data-source-properties:
        prepareThreshold: 0
        preparedStatementCacheQueries: 0

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false           # Never hold a DB connection for the full HTTP request lifecycle
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        default_schema: public
        jdbc:
          batch_size: 20
          fetch_size: 50

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    connect-retries: 5            # Retry DB connection up to 5 times before failing

  ai:
    openai:
      api-key: ${GROQ_API_KEY:}
      base-url: https://api.groq.com/openai/
      chat:
        options:
          model: llama-3.1-8b-instant

external:
  newsdata:
    url: ${NEWSDATA_API_URL:https://newsdata.io/api/1/news}
    key: ${NEWSDATA_API_KEY:}
  newsapi:
    url: ${NEWSAPI_URL:https://newsapi.org/v2/top-headlines}
    key: ${NEWSAPI_KEY:}

ingestion:
  interval:
    ms: 600000

# ── Scheduled bulk ingestion jobs ─────────────────────────────────────────────
scheduler:
  newsdata:
    enabled: true
    # Cron expression: second minute hour day month weekday  (6 AM daily)
    cron: '0 0 6 * * *'
    # Maximum number of paginated API requests per run (each page = page-size articles)
    max-requests: 100
    # Number of articles requested per API call (Newsdata.io default/max is 10 on free tier)
    page-size: 10
    # Optional filters applied to every API request
    country: us
    language: en
    # category: general   # Optional – omit to fetch all categories
  newsapi:
    enabled: true
    # Cron expression: second minute hour day month weekday  (7 AM daily)
    cron: '0 0 7 * * *'
    # Maximum number of paginated API requests per run
    max-requests: 50
    # Number of articles per API call (NewsAPI free tier max = 100; set lower to stay within limits)
    page-size: 20
    # Optional filters applied to every API request
    country: us
    language: en
    # category: general   # Optional – omit to fetch all categories

# ── Keep-alive self-ping (prevents Render free-tier spin-down) ────────────────
app:
  keep-alive:
    url: ${KEEP_ALIVE_URL:https://real-newsletter.onrender.com/actuator/health}

# ── CORS ─────────────────────────────────────────────────────────────────────
# Override CORS_ALLOWED_ORIGINS env var on Render/prod to restrict origins, e.g.:
#   CORS_ALLOWED_ORIGINS=https://my-frontend.vercel.app
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4201,https://real-newsletter.onrender.com}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  max-age: 3600

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

# ── Rate limiting (Resilience4j RateLimiter, per client IP) ──────────────────
rate-limit:
  enabled: true
  # Maximum requests allowed per refresh window (Resilience4j: limitForPeriod)
  limit-for-period: 100
  # Length of one window in seconds (Resilience4j: limitRefreshPeriod)
  limit-refresh-period-seconds: 60
  # Milliseconds to wait for a permit; 0 = fail fast → HTTP 429 immediately
  timeout-duration-millis: 0
  # URL path patterns the limiter is applied to
  path-patterns:
    - /api/**
