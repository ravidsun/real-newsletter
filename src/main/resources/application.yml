spring:
  datasource:
    # Supabase Transaction Pooler JDBC URL (port 6543).
    # Append query params to disable prepared-statement caching, which is
    # incompatible with PgBouncer transaction-mode pooling.
    url: ${SUPABASE_JDBC_URL}
    username: ${SUPABASE_DB_USER}
    password: ${SUPABASE_DB_PASSWORD}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 5
      # Workaround for "prepared statement does not exist" errors with pgBouncer.
      data-source-properties:
        prepareThreshold: 0
        preparedStatementCacheQueries: 0

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: public

  flyway:
    enabled: true

# ---------------------------------------------------------------------------
# External News API configuration
# ---------------------------------------------------------------------------
external:
  news:
    api:
      url: ${EXTERNAL_NEWS_API_URL:https://newsapi.org/v2/top-headlines}
      key: ${EXTERNAL_NEWS_API_KEY:}

# ---------------------------------------------------------------------------
# Ingestion scheduler configuration
# ---------------------------------------------------------------------------
ingestion:
  interval:
    ms: ${INGESTION_INTERVAL_MS:600000}

