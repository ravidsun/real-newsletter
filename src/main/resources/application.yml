spring:
  profiles:
    active: dev
  datasource:
    # Supabase Transaction Pooler JDBC URL (port 6543).
    # Loaded from SUPABASE_JDBC_URL environment variable (via .env file).
    # Falls back to local PostgreSQL if environment variables are not set.
    url: ${SUPABASE_JDBC_URL:jdbc:postgresql://localhost:5432/newsletter}
    username: ${SUPABASE_DB_USER:postgres}
    password: ${SUPABASE_DB_PASSWORD:postgres}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 5
      # Workaround for "prepared statement does not exist" errors with pgBouncer.
      data-source-properties:
        prepareThreshold: 0
        preparedStatementCacheQueries: 0

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: public

  flyway:
    enabled: true

  ai:
    openai:
      api-key: ${GROQ_API_KEY:}
      base-url: https://api.groq.com/openai/
      chat:
        options:
          model: llama-3.1-8b-instant

external:
  newsdata:
    url: ${NEWSDATA_API_URL:https://newsdata.io/api/1/news}
    key: ${NEWSDATA_API_KEY:}
  newsapi:
    url: ${NEWSAPI_URL:https://newsapi.org/v2/top-headlines}
    key: ${NEWSAPI_KEY:}

ingestion:
  interval:
    ms: 600000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

