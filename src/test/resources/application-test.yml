spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 2
      minimum-idle: 2

  jpa:
    hibernate:
      # Let Hibernate create/drop the schema from entity metadata during tests.
      # This is safe because tests run against an isolated in-memory database.
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect

  # Disable Flyway for tests because V1 migration uses PostgreSQL-specific
  # extensions (uuid-ossp) that are not available in H2.
  flyway:
    enabled: false

  ai:
    openai:
      api-key: test-dummy-key-not-real

  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAutoConfiguration

# Disable AI enrichment throttle in tests — no real AI calls are made (ChatClient is mocked)
ai:
  enrichment:
    inter-call-delay-ms: 0

